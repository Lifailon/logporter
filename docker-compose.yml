services:
  logporter:
    image: lifailon/logporter:latest
    container_name: logporter
    restart: always
    ports:
      - 9333:9333
    environment:
      - DOCKER_LOG_METRICS=false
      - DOCKER_LOG_CUSTOM_METRICS=false
      - DOCKER_LOG_CUSTOM_QUERY=\"(err|error|ERR|ERROR)\"
      # Optional: Use a docker proxy instead of the docker socket mount for improved security.
      # - DOCKER_HOST=tcp://docker-proxy:2375
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  # Optional: A docker proxy service is only needed if DOCKER_HOST is set.
  # It improves security by filtering api calls and disallowing write operations.
  # docker-proxy:
  #   image: lscr.io/linuxserver/socket-proxy:latest
  #   container_name: docker-proxy
  #   restart: always
  #   expose:
  #     - 2375
  #   environment:
  #     - CONTAINERS=1
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock:ro

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: always
    ports:
      - 9090:9090
    volumes:
      - prometheus_data:/prometheus
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/alert.yml:/etc/prometheus/alert.yml

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: always
    ports:
      - 3000:3000
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana:/var/lib/grafana/dashboards
      - ./grafana/provider.yaml:/etc/grafana/provisioning/dashboards/provider.yaml
      - ./grafana/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml

volumes:
  grafana_data:
  prometheus_data: