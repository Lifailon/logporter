name: CI

on:
  workflow_dispatch:
    inputs:
      Check:
        description: "Run container and check metrics"
        default: false
        type: boolean
      Publish:
        description: "Publish image to Docker Hub"
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest 

    steps:
      - name: Clone main repository
        uses: actions/checkout@v7

      - name: Build image
        run: |
          docker buildx build \
            -t lifailon/logporter:latest \
            --load .

      - name: Run container
        if: ${{ github.event.inputs.Check == 'true' }}
        run: |
          docker run -d --name logporter \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -p 9333:9333 \
            --restart=always \
            lifailon/logporter:latest

      - name: Check metrics
        if: ${{ github.event.inputs.Check == 'true' }}
        run: |
          curl -sS localhost:9333/metrics
          for i in {1..5}; do
            curl -sS localhost:9333/metrics | grep 'containerName="logporter"' | grep docker_cpu_usage_total
            sleep 5
          done

      - name: Login to Docker Hub
        if: ${{ github.event.inputs.Publish == 'true' }}
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Publish image to Docker Hub
        if: ${{ github.event.inputs.Publish == 'true' }}
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -t lifailon/logporter:latest \
            --push .